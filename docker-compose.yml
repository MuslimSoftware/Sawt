services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      platforms: ["linux/amd64"]
    env_file:
      - ./backend/.env
    environment:
      - WHISPER_MODEL=ggml-base.en.bin
    ports:
      - "0.0.0.0:8000:8000"
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      platforms: ["linux/amd64"]
    environment:
      - NEXT_PUBLIC_BACKEND_WS=ws://localhost:8000/ws
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
